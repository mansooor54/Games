// ── Apply damage to player helper ────────────────────────────────────
function damagePlayer(s, p, amount){
  if(p.shieldTimer > 0 || p.invuln > 0) return false;
  s.lives -= (amount||1);
  s.flash = 15;
  p.invuln = 90;
  p.damageTaken = true;
  triggerScreenShake(8);
  playSound('damage');
  if(s.lives <= 0){
    s.gameOver = true;
    playSound('lose');
    saveScore(s.score);
    if(s.mode === 'survival'){
      const stats = getAchieveStats();
      if(survivalStats.wave > stats.maxSurvivalWave) stats.maxSurvivalWave = survivalStats.wave;
      saveAchieveStats(stats);
      checkAchievements();
      showOverlay(`انتهت اللعبة! الموجة: ${survivalStats.wave}`, `القتلى: ${survivalStats.monstersKilled}`, false);
    } else {
      showOverlay('انتهت اللعبة!','',false);
    }
    return true;
  }
  return false;
}

// ── Blood/Spark Particle Trails ──────────────────────────────────────
function spawnHitParticles(x, y, color, count, hasTrail){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*4;
    state.particles.push({
      x, y,
      dx: Math.cos(angle)*speed,
      dy: Math.sin(angle)*speed,
      life: 20 + Math.floor(Math.random()*15),
      color,
      trail: hasTrail ? true : false,
      size: 1.5 + Math.random()*2.5
    });
  }
}

// ── Ultimate Ability ─────────────────────────────────────────────────
function activateUltimate(s, p){
  if(p.ultimateCharge < 100) return;
  p.ultimateCharge = 0;
  p.ultimateActive = 180; // 3 seconds at 60fps
  playSound('ultimate');
  triggerScreenShake(12);

  // Freeze all monsters
  for(const m of s.monsters){
    if(m.alive) m.frozen = 180;
  }
  if(s.boss && s.boss.alive) s.boss.frozen = 180;

  // Damage nearby monsters
  for(const m of s.monsters){
    if(!m.alive) continue;
    const dist = Math.sqrt((m.x-p.x)**2 + (m.y-p.y)**2);
    if(dist < TILE*5){
      m.hp -= 2;
      m.hit = 8;
      spawnHitParticles(m.x, m.y, '#88ccff', 10, true);
      if(m.hp <= 0){
        m.alive = false; m.deathAnim = 20;
        s.score += m.score;
        s.killsThisLevel++;
        playSound('monster_die');
      }
    }
  }
  if(s.boss && s.boss.alive){
    const dist = Math.sqrt((s.boss.x-p.x)**2 + (s.boss.y-p.y)**2);
    if(dist < TILE*5){
      s.boss.hp -= 3;
      s.boss.hit = 8;
      spawnHitParticles(s.boss.x, s.boss.y, '#88ccff', 15, true);
    }
  }

  // Visual particles
  for(let i=0;i<30;i++){
    const angle = Math.random()*Math.PI*2;
    const dist = Math.random()*TILE*5;
    s.particles.push({
      x: p.x + Math.cos(angle)*dist,
      y: p.y + Math.sin(angle)*dist,
      dx: Math.cos(angle)*2,
      dy: Math.sin(angle)*2,
      life: 40, color:'#60a5fa', size:3, trail:true
    });
  }
}

// ── Gamepad Support ──────────────────────────────────────────────────
let gamepadState = {axes:[0,0,0,0], buttons:{}};
function pollGamepad(){
  const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
  const gp = gamepads[0];
  if(!gp) return;
  gamepadState.axes = [...gp.axes];
  for(let i=0;i<gp.buttons.length;i++){
    gamepadState.buttons[i] = gp.buttons[i].pressed;
  }
}

// ── Main Game Loop ───────────────────────────────────────────────────
function loop(){
  raf = requestAnimationFrame(loop);
  if(!state) return;
  frame++;
  const s = state;
  const p = s.player;
  const dm = DIFF_MULT[settings.difficulty];

  updateScreenShake();
  updateFade();
  pollGamepad();

  // ── Update ─────────────────────────────────────────────────────────
  if(!s.gameOver && !s.won){
    // Player movement
    let dx=0, dy=0;
    if(keys['w']||keys['arrowup'])   {dy=-1;p.dir=[0,-1];}
    if(keys['s']||keys['arrowdown']) {dy=1;p.dir=[0,1];}
    if(keys['a']||keys['arrowleft']) {dx=-1;p.dir=[-1,0];}
    if(keys['d']||keys['arrowright']){dx=1;p.dir=[1,0];}

    // Two-player: P1 uses WASD only
    if(s.mode === 'twoplayer'){
      dx=0;dy=0;
      if(keys['w']){dy=-1;p.dir=[0,-1];}
      if(keys['s']){dy=1;p.dir=[0,1];}
      if(keys['a']){dx=-1;p.dir=[-1,0];}
      if(keys['d']){dx=1;p.dir=[1,0];}
    }

    // Gamepad input
    if(Math.abs(gamepadState.axes[0])>0.3 || Math.abs(gamepadState.axes[1])>0.3){
      dx = gamepadState.axes[0]; dy = gamepadState.axes[1];
      if(Math.abs(dx)>Math.abs(dy)) p.dir=[Math.sign(dx),0];
      else p.dir=[0,Math.sign(dy)];
    }
    // Gamepad dpad
    if(gamepadState.buttons[12]) {dy=-1;p.dir=[0,-1];}
    if(gamepadState.buttons[13]) {dy=1;p.dir=[0,1];}
    if(gamepadState.buttons[14]) {dx=-1;p.dir=[-1,0];}
    if(gamepadState.buttons[15]) {dx=1;p.dir=[1,0];}

    // Ice slide effect
    if(p.slideTimer > 0){
      p.slideTimer--;
      if(p.slideDir){
        dx = p.slideDir[0]; dy = p.slideDir[1];
      }
    }

    // Lava slow
    let speedMult = 1;
    const pgx = Math.floor(p.x/TILE), pgy = Math.floor(p.y/TILE);
    for(const trap of s.traps){
      if(trap.type === TRAP_LAVA && trap.x === pgx && trap.y === pgy){
        speedMult = 0.5;
      }
    }

    const baseSpeed = (3 + persist.speedBonus + (p.speedTimer>0?1.5:0) + (p.buffType==='speed'&&p.buffTimer>0?1:0)) * speedMult;
    if(dx||dy){
      const len=Math.sqrt(dx*dx+dy*dy);
      dx=dx/len*baseSpeed; dy=dy/len*baseSpeed;
      footstepTimer++;
      if(footstepTimer>12){footstepTimer=0;playSound('footstep');}
    }
    if(canMove(s.maze,p.x+dx,p.y+dy)){p.x+=dx;p.y+=dy;}
    else if(canMove(s.maze,p.x+dx,p.y)){p.x+=dx;}
    else if(canMove(s.maze,p.x,p.y+dy)){p.y+=dy;}

    p.smoothX+=(p.x-p.smoothX)*0.3;
    p.smoothY+=(p.y-p.smoothY)*0.3;

    // Weapon switch (Q or gamepad Y)
    if((keys['q']&&!keys._qHandled) || (gamepadState.buttons[3]&&!gamepadState._yHandled)){
      keys._qHandled=true; gamepadState._yHandled=true;
      const weps = s.weapons;
      const ci = weps.indexOf(s.currentWeapon);
      s.currentWeapon = weps[(ci+1)%weps.length];
    }
    if(!keys['q']) keys._qHandled=false;
    if(!gamepadState.buttons[3]) gamepadState._yHandled=false;

    // Ultimate (E or gamepad LB)
    if((keys['e']&&!keys._eHandled) || (gamepadState.buttons[4]&&!gamepadState._lbHandled)){
      keys._eHandled=true; gamepadState._lbHandled=true;
      activateUltimate(s, p);
    }
    if(!keys['e']) keys._eHandled=false;
    if(!gamepadState.buttons[4]) gamepadState._lbHandled=false;

    // Shoot (Space or gamepad A)
    if(keys[' '] || gamepadState.buttons[0]){
      const wep = WEAPONS[s.currentWeapon];
      const now = Date.now();
      if(now-s.lastShot>wep.fireRate){
        s.lastShot=now;
        playSound(wep.id==='shotgun'?'shotgun':wep.id==='rapid'?'rapid':'shoot');
        for(let i=0;i<wep.count;i++){
          const angle = Math.atan2(p.dir[1],p.dir[0]) + (wep.count>1?(i-Math.floor(wep.count/2))*wep.spread : (Math.random()-.5)*wep.spread*2);
          s.bullets.push({x:p.x,y:p.y,dx:Math.cos(angle)*wep.speed,dy:Math.sin(angle)*wep.speed,life:50,damage:wep.damage*(p.buffType==='damage'&&p.buffTimer>0?2:1),color:wep.color,owner:1});
        }
      }
    }

    // Timers
    if(p.invuln>0) p.invuln--;
    if(p.shieldTimer>0) p.shieldTimer--;
    if(p.speedTimer>0) p.speedTimer--;
    if(p.buffTimer>0) p.buffTimer--;
    if(p.ultimateActive>0) p.ultimateActive--;
    if(p.trapCooldown>0) p.trapCooldown--;

    // ── Floor Traps ──────────────────────────────────────────────────
    if(p.trapCooldown <= 0){
      for(const trap of s.traps){
        if(Math.floor(p.x/TILE)===trap.x && Math.floor(p.y/TILE)===trap.y){
          if(trap.type === TRAP_SPIKE){
            p.trapCooldown = 60;
            playSound('trap');
            damagePlayer(s, p, 1);
          } else if(trap.type === TRAP_LAVA){
            p.trapCooldown = 30;
            playSound('trap');
            damagePlayer(s, p, 1);
          } else if(trap.type === TRAP_ICE){
            if(p.slideTimer <= 0){
              p.slideDir = [...p.dir];
              p.slideTimer = 20;
            }
          }
        }
      }
    }

    // ── Pressure Buttons ─────────────────────────────────────────────
    for(const btn of s.buttons){
      if(!btn.pressed && Math.floor(p.x/TILE)===btn.bx && Math.floor(p.y/TILE)===btn.by){
        btn.pressed = true;
        playSound('button');
        // Open secret passage
        if(s.maze[btn.wy]&&s.maze[btn.wy][btn.wx]===WALL){
          s.maze[btn.wy][btn.wx] = PATH;
          for(let i=0;i<12;i++) s.particles.push({x:btn.wx*TILE+TILE/2,y:btn.wy*TILE+TILE/2,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,life:25,color:'#fbbf24',size:2});
        }
      }
    }

    // ── Rescue NPCs ──────────────────────────────────────────────────
    for(const npc of s.npcs){
      if(!npc.rescued && Math.abs(p.x-npc.x)<16 && Math.abs(p.y-npc.y)<16){
        npc.rescued = true;
        playSound('rescue');
        s.score += 75;
        // Random buff
        const buffs = ['speed','damage','shield'];
        const buff = buffs[Math.floor(Math.random()*buffs.length)];
        if(buff === 'shield'){p.shieldTimer = Math.max(p.shieldTimer, 300);}
        else { p.buffType = buff; p.buffTimer = 300; }
        for(let i=0;i<15;i++) s.particles.push({x:npc.x,y:npc.y,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:25,color:'#60a5fa',size:2});

        const stats = getAchieveStats();
        stats.totalRescued = (stats.totalRescued||0) + 1;
        saveAchieveStats(stats);
        checkAchievements();
      }
    }

    // Level timer (not for survival)
    if(s.mode !== 'survival'){
      s.timer--;
      if(s.timer<=0){
        s.gameOver=true;
        playSound('lose');
        saveScore(s.score);
        showOverlay('انتهى الوقت!','',false);
      }
    }

    // Exit check
    if(s.mode !== 'survival'){
      const gx=Math.floor(p.x/TILE), gy=Math.floor(p.y/TILE);
      if(s.maze[gy]&&s.maze[gy][gx]===EXIT){
        if(!s.boss || !s.boss.alive){
          s.won=true;
          const timeBonus = Math.floor(Math.max(0,s.timer)/60)*2;
          s.score += 100*s.level + timeBonus;
          persist.score = s.score;
          playSound('win');
          saveScore(s.score);
          markLevelCompleted(s.level);

          // Achievement checks
          const elapsed = (Date.now()-s.startTime)/1000;
          const stats = getAchieveStats();
          stats.totalScore = Math.max(stats.totalScore||0, s.score);
          if(!p.damageTaken) stats.levelNoDamage = true;
          if(elapsed < 30) stats.levelUnder30s = true;
          saveAchieveStats(stats);
          checkAchievements();

          showOverlay(`المستوى ${s.level} مكتمل!`,`مكافأة الوقت: ${timeBonus}`,true);
        }
      }
    }

    // Survival mode wave logic
    if(s.mode === 'survival'){
      const aliveMonsters = s.monsters.filter(m=>m.alive).length;
      if(aliveMonsters === 0){
        spawnSurvivalWave();
        // Check achievement
        const stats = getAchieveStats();
        if(s.survivalWave > (stats.maxSurvivalWave||0)){
          stats.maxSurvivalWave = s.survivalWave;
          saveAchieveStats(stats);
          checkAchievements();
        }
      }
      if(s.survivalWaveTimer > 0) s.survivalWaveTimer--;
    }

    // Key collection
    for(const k of s.doorKeys){
      if(!k.collected && Math.abs(p.x-k.x)<16 && Math.abs(p.y-k.y)<16){
        k.collected=true;
        s.keysCollected[k.type]=true;
        playSound('key');
        s.score+=25;
        for(let i=0;i<10;i++) s.particles.push({x:k.x,y:k.y,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:20,color:k.color,size:2});
      }
    }

    // Door unlock
    for(const d of s.doors){
      if(!d.open && s.keysCollected[d.type]){
        const dist = Math.abs(p.x-(d.x*TILE+TILE/2))+Math.abs(p.y-(d.y*TILE+TILE/2));
        if(dist<TILE*2){
          d.open=true;
          s.maze[d.y][d.x]=PATH;
          playSound('door');
          for(let i=0;i<15;i++) s.particles.push({x:d.x*TILE+TILE/2,y:d.y*TILE+TILE/2,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,life:25,color:d.color,size:2});
        }
      }
    }

    // Item collection
    for(const item of s.items){
      if(!item.active) continue;
      if(Math.abs(p.x-item.x)<14 && Math.abs(p.y-item.y)<14){
        item.active=false;
        playSound('pickup');
        if(item.type==='health'){s.lives=Math.min(s.lives+1,10);}
        else if(item.type==='shield'){p.shieldTimer=300;}
        else if(item.type==='speed'){p.speedTimer=300;}
        else if(item.type==='coin'){s.score+=50;}
        for(let i=0;i<8;i++) s.particles.push({x:item.x,y:item.y,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,life:15,color:item.color,size:2});
      }
    }

    updateExplored(s.explored, p.x, p.y, TILE*5);

    // ── Player 2 Update (Two Player Mode) ────────────────────────────
    if(s.mode === 'twoplayer' && player2State && player2State.alive){
      const p2 = player2State;
      let dx2=0, dy2=0;
      if(keys['arrowup'])   {dy2=-1;p2.dir=[0,-1];}
      if(keys['arrowdown']) {dy2=1;p2.dir=[0,1];}
      if(keys['arrowleft']) {dx2=-1;p2.dir=[-1,0];}
      if(keys['arrowright']){dx2=1;p2.dir=[1,0];}

      const spd2 = 3 + (p2.speedTimer>0?1.5:0);
      if(dx2||dy2){
        const len=Math.sqrt(dx2*dx2+dy2*dy2);
        dx2=dx2/len*spd2; dy2=dy2/len*spd2;
      }
      if(canMove(s.maze,p2.x+dx2,p2.y+dy2)){p2.x+=dx2;p2.y+=dy2;}
      else if(canMove(s.maze,p2.x+dx2,p2.y)){p2.x+=dx2;}
      else if(canMove(s.maze,p2.x,p2.y+dy2)){p2.y+=dy2;}

      if(p2.invuln>0)p2.invuln--;
      if(p2.shieldTimer>0)p2.shieldTimer--;
      if(p2.speedTimer>0)p2.speedTimer--;
      if(p2.trapCooldown>0)p2.trapCooldown--;

      // P2 shoot (Enter)
      if(keys['enter']){
        const wep = WEAPONS[p2.currentWeapon];
        const now = Date.now();
        if(now-p2.lastShot>wep.fireRate){
          p2.lastShot=now;
          playSound(wep.id==='shotgun'?'shotgun':wep.id==='rapid'?'rapid':'shoot');
          for(let i=0;i<wep.count;i++){
            const angle=Math.atan2(p2.dir[1],p2.dir[0])+(wep.count>1?(i-Math.floor(wep.count/2))*wep.spread:(Math.random()-.5)*wep.spread*2);
            s.bullets.push({x:p2.x,y:p2.y,dx:Math.cos(angle)*wep.speed,dy:Math.sin(angle)*wep.speed,life:50,damage:wep.damage,color:wep.color,owner:2});
          }
        }
      }

      // P2 trap collision
      if(p2.trapCooldown <= 0){
        for(const trap of s.traps){
          if(Math.floor(p2.x/TILE)===trap.x && Math.floor(p2.y/TILE)===trap.y){
            if(trap.type===TRAP_SPIKE||trap.type===TRAP_LAVA){
              p2.trapCooldown = trap.type===TRAP_SPIKE?60:30;
              if(p2.invuln<=0&&p2.shieldTimer<=0){
                p2.lives--;p2.invuln=90;
                triggerScreenShake(6);
                playSound('trap');
                if(p2.lives<=0){p2.alive=false;}
              }
            } else if(trap.type===TRAP_ICE && (!p2.slideDir||p2.slideTimer<=0)){
              p2.slideDir=[...p2.dir];p2.slideTimer=20;
            }
          }
        }
      }
      if(p2.slideTimer>0)p2.slideTimer--;

      // P2 item collection
      for(const item of s.items){
        if(!item.active)continue;
        if(Math.abs(p2.x-item.x)<14&&Math.abs(p2.y-item.y)<14){
          item.active=false;playSound('pickup');
          if(item.type==='health')p2.lives=Math.min(p2.lives+1,10);
          else if(item.type==='shield')p2.shieldTimer=300;
          else if(item.type==='speed')p2.speedTimer=300;
          else if(item.type==='coin')s.score+=50;
        }
      }

      // Both dead = game over in 2p
      if(!p2.alive && s.lives<=0){
        s.gameOver=true;playSound('lose');saveScore(s.score);
        showOverlay('انتهت اللعبة!','',false);
      }
    }
  }

  // ── Bullets ────────────────────────────────────────────────────────
  s.bullets = s.bullets.filter(b=>{
    b.x+=b.dx;b.y+=b.dy;b.life--;
    const gx=Math.floor(b.x/TILE),gy=Math.floor(b.y/TILE);
    if(gx<0||gx>=COLS||gy<0||gy>=ROWS) return false;
    const t=s.maze[gy][gx];
    if(t===WALL||t===DOOR_R||t===DOOR_B||t===DOOR_G){
      for(let i=0;i<4;i++) s.particles.push({x:b.x,y:b.y,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,life:12,color:b.color||'#fbbf24',size:2});
      return false;
    }
    return b.life>0;
  });

  // Enemy bullets
  s.enemyBullets = s.enemyBullets.filter(b=>{
    b.x+=b.dx;b.y+=b.dy;b.life--;
    const gx=Math.floor(b.x/TILE),gy=Math.floor(b.y/TILE);
    if(gx<0||gx>=COLS||gy<0||gy>=ROWS) return false;
    if(s.maze[gy][gx]===WALL) return false;
    // Hit player 1
    if(!s.gameOver&&!s.won&&Math.abs(b.x-p.x)<12&&Math.abs(b.y-p.y)<12){
      damagePlayer(s, p, 1);
      return false;
    }
    // Hit player 2
    if(s.mode==='twoplayer'&&player2State&&player2State.alive){
      if(Math.abs(b.x-player2State.x)<12&&Math.abs(b.y-player2State.y)<12){
        if(player2State.invuln<=0&&player2State.shieldTimer<=0){
          player2State.lives--;player2State.invuln=90;triggerScreenShake(6);playSound('damage');
          if(player2State.lives<=0)player2State.alive=false;
        }
        return false;
      }
    }
    return b.life>0;
  });

  // ── Monsters ───────────────────────────────────────────────────────
  if(!s.gameOver&&!s.won){
    for(const m of s.monsters){
      if(!m.alive){
        if(m.deathAnim>0) m.deathAnim--;
        continue;
      }
      if(m.hit>0){m.hit--;continue;}
      if(m.frozen>0){m.frozen--;continue;}

      m.moveTimer++;
      const spd = (1+s.level*0.2)*m.speed*dm;
      const moveInterval = m.type==='fast'?4:8;

      if(m.moveTimer>moveInterval){
        m.moveTimer=0;
        const mspd=spd*4;
        if(Math.random()<0.3){
          // Target closest player
          let tx=p.x, ty=p.y;
          if(s.mode==='twoplayer'&&player2State&&player2State.alive){
            const d1=Math.abs(p.x-m.x)+Math.abs(p.y-m.y);
            const d2=Math.abs(player2State.x-m.x)+Math.abs(player2State.y-m.y);
            if(d2<d1){tx=player2State.x;ty=player2State.y;}
          }
          const ddx=tx-m.x, ddy=ty-m.y;
          if(Math.abs(ddx)>Math.abs(ddy)) m.dir=[Math.sign(ddx),0];
          else m.dir=[0,Math.sign(ddy)];
        }
        const nx=m.x+m.dir[0]*mspd, ny=m.y+m.dir[1]*mspd;
        if(canMove(s.maze,nx,ny,10)){m.x=nx;m.y=ny;}
        else{
          const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>!(d[0]===m.dir[0]&&d[1]===m.dir[1]));
          m.dir=dirs[Math.floor(Math.random()*dirs.length)];
        }
      }

      if(m.type==='shooter'){
        m.shootTimer=(m.shootTimer||0)+1;
        if(m.shootTimer>120){
          m.shootTimer=0;
          let tx=p.x,ty=p.y;
          if(s.mode==='twoplayer'&&player2State&&player2State.alive){
            const d1=Math.abs(p.x-m.x)+Math.abs(p.y-m.y);
            const d2=Math.abs(player2State.x-m.x)+Math.abs(player2State.y-m.y);
            if(d2<d1){tx=player2State.x;ty=player2State.y;}
          }
          const ddx=tx-m.x, ddy=ty-m.y;
          const dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist<TILE*8 && dist>0){
            s.enemyBullets.push({x:m.x,y:m.y,dx:ddx/dist*4,dy:ddy/dist*4,life:80});
          }
        }
      }

      // Bullet hit monster
      for(let bi=s.bullets.length-1;bi>=0;bi--){
        const b=s.bullets[bi];
        if(Math.abs(b.x-m.x)<14&&Math.abs(b.y-m.y)<14){
          m.hp-=b.damage;
          s.bullets.splice(bi,1);
          m.hit=6;
          spawnHitParticles(m.x, m.y, m.color, 8, true);
          if(m.hp<=0){
            m.alive=false;m.deathAnim=20;
            s.score+=m.score;
            s.killsThisLevel++;
            p.ultimateCharge = Math.min(100, p.ultimateCharge + 10);
            playSound('monster_die');
            spawnHitParticles(m.x, m.y, m.color, 15, true);

            if(s.mode==='survival') survivalStats.monstersKilled++;
            const stats = getAchieveStats();
            stats.totalKills = (stats.totalKills||0) + 1;
            stats.totalScore = Math.max(stats.totalScore||0, s.score);
            saveAchieveStats(stats);
            checkAchievements();
          }
          break;
        }
      }

      // Player collision
      if(m.alive){
        if(p.invuln<=0&&p.shieldTimer<=0&&Math.abs(p.x-m.x)<16&&Math.abs(p.y-m.y)<16){
          damagePlayer(s, p, 1);
        }
        if(s.mode==='twoplayer'&&player2State&&player2State.alive&&player2State.invuln<=0&&player2State.shieldTimer<=0){
          if(Math.abs(player2State.x-m.x)<16&&Math.abs(player2State.y-m.y)<16){
            player2State.lives--;player2State.invuln=90;triggerScreenShake(6);playSound('damage');
            if(player2State.lives<=0)player2State.alive=false;
          }
        }
      }
    }

    // ── Boss ─────────────────────────────────────────────────────────
    if(s.boss&&s.boss.alive){
      const b=s.boss;
      if(b.hit>0) b.hit--;
      if(b.frozen>0){b.frozen--;} else {
        b.timer++;
        b.moveTimer++;

        if(b.moveTimer>10){
          b.moveTimer=0;
          let tx=p.x,ty=p.y;
          if(s.mode==='twoplayer'&&player2State&&player2State.alive){
            const d1=Math.abs(p.x-b.x)+Math.abs(p.y-b.y);
            const d2=Math.abs(player2State.x-b.x)+Math.abs(player2State.y-b.y);
            if(d2<d1){tx=player2State.x;ty=player2State.y;}
          }
          const ddx=tx-b.x, ddy=ty-b.y;
          const dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist>0){
            const spd=2*dm;
            const nx=b.x+ddx/dist*spd*4, ny=b.y+ddy/dist*spd*4;
            if(canMove(s.maze,nx,ny,18)){b.x=nx;b.y=ny;}
          }
        }

        b.attackTimer++;
        if(b.attackTimer>90){
          b.attackTimer=0;
          playSound('boss_attack');
          for(let i=0;i<8;i++){
            const angle = (Math.PI*2/8)*i + frame*0.01;
            s.enemyBullets.push({x:b.x,y:b.y,dx:Math.cos(angle)*3,dy:Math.sin(angle)*3,life:100});
          }
          const ddx=p.x-b.x,ddy=p.y-b.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);
          if(dist>0){
            s.enemyBullets.push({x:b.x,y:b.y,dx:ddx/dist*5,dy:ddy/dist*5,life:80});
          }
        }
      }

      // Bullet hit boss
      for(let bi=s.bullets.length-1;bi>=0;bi--){
        const bu=s.bullets[bi];
        if(Math.abs(bu.x-b.x)<22&&Math.abs(bu.y-b.y)<22){
          b.hp-=bu.damage;
          s.bullets.splice(bi,1);
          b.hit=4;
          spawnHitParticles(b.x, b.y, b.color, 10, true);
          if(b.hp<=0){
            b.alive=false;b.deathAnim=40;
            s.score+=200;
            p.ultimateCharge = Math.min(100, p.ultimateCharge + 30);
            playSound('boss_die');
            spawnHitParticles(b.x, b.y, b.color, 30, true);
            const stats = getAchieveStats();
            stats.bossesKilled = (stats.bossesKilled||0) + 1;
            stats.totalScore = Math.max(stats.totalScore||0, s.score);
            saveAchieveStats(stats);
            checkAchievements();
          }
          break;
        }
      }

      // Boss-player collision
      if(b.alive && b.frozen<=0){
        if(p.invuln<=0&&p.shieldTimer<=0&&Math.abs(p.x-b.x)<26&&Math.abs(p.y-b.y)<26){
          damagePlayer(s, p, 1);
        }
        if(s.mode==='twoplayer'&&player2State&&player2State.alive&&player2State.invuln<=0&&player2State.shieldTimer<=0){
          if(Math.abs(player2State.x-b.x)<26&&Math.abs(player2State.y-b.y)<26){
            player2State.lives--;player2State.invuln=90;triggerScreenShake(6);playSound('damage');
            if(player2State.lives<=0)player2State.alive=false;
          }
        }
      }
    }
  }

  // Particles
  s.particles=s.particles.filter(pt=>{
    pt.x+=pt.dx;pt.y+=pt.dy;pt.dx*=0.95;pt.dy*=0.95;pt.life--;
    // Trail particles spawn smaller children
    if(pt.trail && pt.life > 5 && frame%3===0){
      s.particles.push({x:pt.x,y:pt.y,dx:(Math.random()-.5)*0.5,dy:(Math.random()-.5)*0.5,life:8,color:pt.color,size:(pt.size||2)*0.5,trail:false});
    }
    return pt.life>0;
  });
  if(s.flash>0)s.flash--;

  // ── DRAW ───────────────────────────────────────────────────────────
  const theme = s.theme;
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  ctx.fillStyle=theme.bg;
  ctx.fillRect(-5,-5,W+10,H+10);

  // Draw maze tiles with 3D shadows
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const tx=x*TILE, ty=y*TILE, t=s.maze[y][x];
      if(t===WALL){
        drawWall3D(ctx, tx, ty, theme, s.maze, x, y);
      } else if(t===EXIT){
        const pulse=Math.sin(frame*0.08)*0.3+0.7;
        ctx.fillStyle=`rgba(52,211,153,${pulse})`;
        ctx.fillRect(tx,ty,TILE,TILE);
        ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
        ctx.fillText('🚪',tx+TILE/2,ty+TILE/2+6);
      } else if(t===DOOR_R||t===DOOR_B||t===DOOR_G){
        const dc = t===DOOR_R?'#ef4444':t===DOOR_B?'#3b82f6':'#22c55e';
        ctx.fillStyle=dc;ctx.globalAlpha=0.6+Math.sin(frame*0.06)*0.2;
        ctx.fillRect(tx,ty,TILE,TILE);ctx.globalAlpha=1;
        ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
        ctx.fillText('🔒',tx+TILE/2,ty+TILE/2+5);
      } else {
        ctx.fillStyle=theme.floor;
        ctx.fillRect(tx,ty,TILE,TILE);
      }
    }
  }

  // Floor traps
  for(const trap of s.traps){
    drawTrap(ctx, trap);
  }

  // Buttons
  for(const btn of s.buttons){
    drawButton(ctx, btn);
    // Draw secret wall indicator if not pressed
    if(!btn.pressed && s.maze[btn.wy] && s.maze[btn.wy][btn.wx]===WALL){
      // Subtle glow on the wall
      ctx.fillStyle = 'rgba(251,191,36,0.1)';
      ctx.fillRect(btn.wx*TILE, btn.wy*TILE, TILE, TILE);
    }
  }

  // Keys
  for(const k of s.doorKeys){
    if(k.collected) continue;
    const bob=Math.sin(frame*0.06+k.x)*3;
    ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText(k.emoji,k.x,k.y+bob+4);
    ctx.shadowColor=k.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(k.x,k.y+bob,6,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();
    ctx.shadowBlur=0;
  }

  // Items
  for(const item of s.items){
    if(!item.active) continue;
    item.bob+=0.04;
    const bob=Math.sin(item.bob)*3;
    ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText(item.emoji,item.x,item.y+bob+4);
  }

  // NPCs
  for(const npc of s.npcs){
    drawNPC(ctx, npc);
  }

  // Monsters
  for(const m of s.monsters){
    if(!m.alive){
      if(m.deathAnim>0){
        ctx.globalAlpha=m.deathAnim/20;
        ctx.fillStyle=m.color;
        const sz=10*(m.deathAnim/20);
        ctx.beginPath();ctx.arc(m.x,m.y,sz+5,0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
      }
      continue;
    }
    const wobble=Math.sin(frame*0.15+m.id)*2;
    drawMonsterShape(ctx, m, wobble);
    ctx.globalAlpha=1;
  }

  // Boss
  if(s.boss){
    if(s.boss.alive){
      drawBoss(ctx, s.boss);
      ctx.globalAlpha=1;
    } else if(s.boss.deathAnim>0){
      s.boss.deathAnim--;
      ctx.globalAlpha=s.boss.deathAnim/40;
      ctx.fillStyle=s.boss.color;
      ctx.beginPath();ctx.arc(s.boss.x,s.boss.y,30*(s.boss.deathAnim/40),0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  // Player 1
  if(!s.gameOver || p.deathAnim>0){
    if(s.gameOver){
      p.deathAnim=(p.deathAnim||20);
      if(p.deathAnim>0) p.deathAnim--;
    }
    if(!(p.invuln>0&&Math.floor(frame/4)%2)){
      ctx.save();
      if(s.gameOver&&p.deathAnim!==undefined) ctx.globalAlpha=(p.deathAnim||0)/20;
      drawPlayer(ctx, p.x, p.y, p.dir, s.currentWeapon, p.shieldTimer, p.speedTimer, false);
      ctx.globalAlpha=1;
      ctx.restore();
    }

    // Ultimate aura
    if(p.ultimateActive > 0){
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(frame*0.2)*0.1;
      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();ctx.arc(p.x, p.y, 30+Math.sin(frame*0.15)*5, 0, Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  // Player 2
  if(s.mode==='twoplayer'&&player2State&&player2State.alive){
    if(!(player2State.invuln>0&&Math.floor(frame/4)%2)){
      drawPlayer(ctx, player2State.x, player2State.y, player2State.dir, player2State.currentWeapon, player2State.shieldTimer, player2State.speedTimer, true);
    }
  }

  // Player bullets
  ctx.shadowColor='#fbbf24';ctx.shadowBlur=6;
  for(const b of s.bullets){
    ctx.fillStyle=b.color||'#fbbf24';
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  // Enemy bullets
  ctx.shadowColor='#ef4444';ctx.shadowBlur=6;
  ctx.fillStyle='#ef4444';
  for(const b of s.enemyBullets){
    ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  // Particles
  for(const pt of s.particles){
    ctx.globalAlpha=Math.min(1, pt.life/25);
    ctx.fillStyle=pt.color;
    const sz = (pt.size||2) + pt.life*0.08;
    ctx.beginPath();ctx.arc(pt.x,pt.y,sz,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── Dynamic Lighting / Fog of War ─────────────────────────────────
  if(s.mode !== 'survival' && s.mode !== 'twoplayer'){
    const lightRadius = TILE*5;
    const fogCanvas = document.createElement('canvas');
    fogCanvas.width=W;fogCanvas.height=H;
    const fogCtx = fogCanvas.getContext('2d');
    fogCtx.fillStyle=theme.fogColor;
    fogCtx.fillRect(0,0,W,H);
    fogCtx.globalCompositeOperation='destination-out';

    const grad = fogCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,lightRadius);
    grad.addColorStop(0,'rgba(0,0,0,1)');
    grad.addColorStop(0.7,'rgba(0,0,0,0.6)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    fogCtx.fillStyle=grad;
    fogCtx.fillRect(p.x-lightRadius,p.y-lightRadius,lightRadius*2,lightRadius*2);

    for(const item of s.items){
      if(!item.active) continue;
      const ig=fogCtx.createRadialGradient(item.x,item.y,0,item.x,item.y,TILE);
      ig.addColorStop(0,'rgba(0,0,0,0.3)');ig.addColorStop(1,'rgba(0,0,0,0)');
      fogCtx.fillStyle=ig;fogCtx.fillRect(item.x-TILE,item.y-TILE,TILE*2,TILE*2);
    }

    const ex=COLS-2, ey=ROWS-2;
    const eg=fogCtx.createRadialGradient(ex*TILE+TILE/2,ey*TILE+TILE/2,0,ex*TILE+TILE/2,ey*TILE+TILE/2,TILE*2);
    eg.addColorStop(0,'rgba(0,0,0,0.4)');eg.addColorStop(1,'rgba(0,0,0,0)');
    fogCtx.fillStyle=eg;fogCtx.fillRect((ex-2)*TILE,(ey-2)*TILE,TILE*4,TILE*4);

    ctx.drawImage(fogCanvas,0,0);
  }

  // Damage flash
  if(s.flash>0){
    ctx.fillStyle=`rgba(239,68,68,${s.flash/15*0.3})`;
    ctx.fillRect(0,0,W,H);
  }

  // ── HUD ────────────────────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,32);
  ctx.font="bold 13px 'Segoe UI',Tahoma,sans-serif";

  let hudX = 8;
  ctx.fillStyle='#e2e8f0';ctx.textAlign='left';
  ctx.fillText(`❤️ ${s.lives}`,hudX,21); hudX+=55;

  const wepName = WEAPONS[s.currentWeapon].name;
  ctx.fillStyle=WEAPONS[s.currentWeapon].color;
  ctx.fillText(`🔫 ${wepName}`,hudX,21); hudX+=80;

  if(p.shieldTimer>0){ctx.fillStyle='#60a5fa';ctx.fillText(`🛡️ ${Math.ceil(p.shieldTimer/60)}`,hudX,21);hudX+=45;}
  if(p.speedTimer>0){ctx.fillStyle='#fbbf24';ctx.fillText(`⚡ ${Math.ceil(p.speedTimer/60)}`,hudX,21);hudX+=45;}
  if(p.buffTimer>0){ctx.fillStyle='#a855f7';ctx.fillText(`✨ ${Math.ceil(p.buffTimer/60)}`,hudX,21);hudX+=45;}

  // Ultimate charge bar
  const ultW=50, ultH=6, ultX=hudX+5, ultY=12;
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(ultX,ultY,ultW,ultH);
  ctx.fillStyle= p.ultimateCharge>=100?'#60a5fa':'#334155';
  ctx.fillRect(ultX,ultY,ultW*(p.ultimateCharge/100),ultH);
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=0.5;ctx.strokeRect(ultX,ultY,ultW,ultH);
  if(p.ultimateCharge>=100){ctx.fillStyle='#60a5fa';ctx.fillText('E',ultX+ultW+4,21);}

  // Center: level/mode
  ctx.fillStyle='#e2e8f0';ctx.textAlign='center';
  if(s.mode==='survival'){
    ctx.fillText(`وضع البقاء - الموجة ${s.survivalWave||1}`,W/2,21);
  } else if(s.mode==='twoplayer'){
    ctx.fillText('وضع لاعبان',W/2,21);
  } else {
    ctx.fillText(`المستوى ${s.level} - ${theme.name}`,W/2,21);
  }

  // Timer (not for survival)
  if(s.mode !== 'survival'){
    const timerSec = Math.max(0,Math.ceil(s.timer/60));
    const timerMin = Math.floor(timerSec/60);
    const timerS = timerSec%60;
    ctx.fillStyle=timerSec<30?'#ef4444':'#94a3b8';
    ctx.textAlign='right';
    ctx.fillText(`⏱️ ${timerMin}:${timerS.toString().padStart(2,'0')}`,W-70,21);
  }

  // Score
  ctx.fillStyle='#fbbf24';ctx.textAlign='right';
  ctx.fillText(`⭐ ${s.score}`,W-8,21);

  // P2 lives
  if(s.mode==='twoplayer'&&player2State){
    ctx.fillStyle='#22c55e';ctx.textAlign='left';
    ctx.fillText(`P2 ❤️ ${player2State.lives}`,8,H-10);
  }

  // Keys collected
  let keyX = 8, keyY = H-20;
  if(s.mode==='twoplayer') keyY -= 20;
  for(const dk of s.doorKeys){
    ctx.font='12px sans-serif';ctx.textAlign='left';
    ctx.globalAlpha=dk.collected?1:0.3;
    ctx.fillText(dk.emoji,keyX,keyY);
    keyX+=20;
  }
  ctx.globalAlpha=1;

  // Survival wave announcement
  if(s.mode==='survival' && s.survivalWaveTimer > 0){
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(W/2-100, H/2-30, 200, 60);
    ctx.fillStyle='#fbbf24';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
    ctx.fillText(`الموجة ${s.survivalWave}`,W/2,H/2+8);
  }

  // ── Minimap ────────────────────────────────────────────────────────
  const mmScale=3, mmW=COLS*mmScale, mmH=ROWS*mmScale;
  const mmX=W-mmW-8, mmY=36;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(mmX-2,mmY-2,mmW+4,mmH+4);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(!s.explored[y][x]){ctx.fillStyle='#111';ctx.fillRect(mmX+x*mmScale,mmY+y*mmScale,mmScale,mmScale);continue;}
      const t=s.maze[y][x];
      if(t===WALL) ctx.fillStyle='#334155';
      else if(t===EXIT) ctx.fillStyle='#34d399';
      else if(t===DOOR_R) ctx.fillStyle='#ef4444';
      else if(t===DOOR_B) ctx.fillStyle='#3b82f6';
      else if(t===DOOR_G) ctx.fillStyle='#22c55e';
      else ctx.fillStyle='#1e293b';
      ctx.fillRect(mmX+x*mmScale,mmY+y*mmScale,mmScale,mmScale);
    }
  }
  ctx.fillStyle='#3b82f6';
  ctx.fillRect(mmX+Math.floor(p.x/TILE)*mmScale,mmY+Math.floor(p.y/TILE)*mmScale,mmScale,mmScale);
  if(s.mode==='twoplayer'&&player2State&&player2State.alive){
    ctx.fillStyle='#22c55e';
    ctx.fillRect(mmX+Math.floor(player2State.x/TILE)*mmScale,mmY+Math.floor(player2State.y/TILE)*mmScale,mmScale,mmScale);
  }
  for(const m of s.monsters){
    if(!m.alive) continue;
    const dist=Math.abs(m.x-p.x)+Math.abs(m.y-p.y);
    if(dist<TILE*6 || s.mode==='survival' || s.mode==='twoplayer'){
      ctx.fillStyle=m.color;
      ctx.fillRect(mmX+Math.floor(m.x/TILE)*mmScale,mmY+Math.floor(m.y/TILE)*mmScale,mmScale,mmScale);
    }
  }
  if(s.boss&&s.boss.alive){
    const dist=Math.abs(s.boss.x-p.x)+Math.abs(s.boss.y-p.y);
    if(dist<TILE*8){
      ctx.fillStyle='#ff0000';
      const bx=mmX+Math.floor(s.boss.x/TILE)*mmScale, by=mmY+Math.floor(s.boss.y/TILE)*mmScale;
      ctx.fillRect(bx-1,by-1,mmScale+2,mmScale+2);
    }
  }

  // Boss HP bar
  if(s.boss&&s.boss.alive){
    const bw=200, bh=12, bx=(W-bw)/2, by=H-30;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx-2,by-2,bw+4,bh+4);
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#ef4444';ctx.fillRect(bx,by,bw*(s.boss.hp/s.boss.maxHp),bh);
    ctx.strokeStyle='#fff';ctx.lineWidth=0.5;ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
    ctx.fillText('الوحش الرئيسي',W/2,by-4);
  }

  ctx.restore(); // screenShake

  // Cinematic fade overlay (drawn outside shake)
  drawFade(ctx);
}

// ── Level Editor ─────────────────────────────────────────────────────
const EDITOR_COLS = 25, EDITOR_ROWS = 19, EDITOR_TILE = 16;
let editorMaze = null;
let editorTool = WALL;
const EDITOR_TOOLS = [
  {id:WALL, name:'جدار', color:'#1e293b'},
  {id:PATH, name:'ممر', color:'#0f172a'},
  {id:EXIT, name:'مخرج', color:'#34d399'},
  {id:TRAP_SPIKE, name:'أشواك', color:'#888'},
  {id:TRAP_LAVA, name:'حمم', color:'#ef4444'},
  {id:TRAP_ICE, name:'جليد', color:'#22d3ee'},
  {id:99, name:'وحش', color:'#ef4444'},
  {id:98, name:'لاعب', color:'#3b82f6'},
];

function initEditor(){
  const eCanvas = document.getElementById('editor-canvas');
  eCanvas.width = EDITOR_COLS * EDITOR_TILE;
  eCanvas.height = EDITOR_ROWS * EDITOR_TILE;
  if(!editorMaze){
    editorMaze = Array.from({length:EDITOR_ROWS},()=>Array(EDITOR_COLS).fill(WALL));
    // Border walls
    for(let y=0;y<EDITOR_ROWS;y++) for(let x=0;x<EDITOR_COLS;x++){
      if(y===0||y===EDITOR_ROWS-1||x===0||x===EDITOR_COLS-1) editorMaze[y][x]=WALL;
      else editorMaze[y][x]=PATH;
    }
    editorMaze[1][1]=98; // player start
    editorMaze[EDITOR_ROWS-2][EDITOR_COLS-2]=EXIT;
  }

  // Toolbar
  const toolbar = document.getElementById('editor-toolbar');
  toolbar.innerHTML = EDITOR_TOOLS.map(t =>
    `<button class="tbtn ${editorTool===t.id?'active':''}" data-tool="${t.id}" style="background:${t.color}33;border-color:${t.color}">${t.name}</button>`
  ).join('');
  toolbar.querySelectorAll('.tbtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      editorTool = parseInt(btn.dataset.tool);
      initEditor(); // refresh toolbar highlight
    });
  });

  renderEditor();

  // Mouse drawing
  let drawing = false;
  eCanvas.onmousedown = (e)=>{ drawing=true; editorPaint(e); };
  eCanvas.onmousemove = (e)=>{ if(drawing) editorPaint(e); };
  eCanvas.onmouseup = ()=> drawing=false;
  eCanvas.onmouseleave = ()=> drawing=false;

  function editorPaint(e){
    const rect = eCanvas.getBoundingClientRect();
    const x = Math.floor((e.clientX-rect.left)/EDITOR_TILE);
    const y = Math.floor((e.clientY-rect.top)/EDITOR_TILE);
    if(x<0||x>=EDITOR_COLS||y<0||y>=EDITOR_ROWS) return;
    if(x===0||x===EDITOR_COLS-1||y===0||y===EDITOR_ROWS-1) return; // keep border
    editorMaze[y][x] = editorTool;
    renderEditor();
  }

  // Load saved levels list
  renderSavedLevels();
}

function renderEditor(){
  const eCanvas = document.getElementById('editor-canvas');
  const ec = eCanvas.getContext('2d');
  for(let y=0;y<EDITOR_ROWS;y++){
    for(let x=0;x<EDITOR_COLS;x++){
      const t = editorMaze[y][x];
      const tool = EDITOR_TOOLS.find(tt=>tt.id===t);
      ec.fillStyle = tool ? tool.color : (t===WALL?'#1e293b':'#0f172a');
      ec.fillRect(x*EDITOR_TILE, y*EDITOR_TILE, EDITOR_TILE, EDITOR_TILE);
      ec.strokeStyle='#334155';ec.lineWidth=0.5;
      ec.strokeRect(x*EDITOR_TILE, y*EDITOR_TILE, EDITOR_TILE, EDITOR_TILE);
      // Labels
      if(t===99){ec.fillStyle='#fff';ec.font='8px sans-serif';ec.textAlign='center';ec.fillText('👾',x*EDITOR_TILE+EDITOR_TILE/2,y*EDITOR_TILE+EDITOR_TILE/2+3);}
      if(t===98){ec.fillStyle='#3b82f6';ec.font='8px sans-serif';ec.textAlign='center';ec.fillText('P',x*EDITOR_TILE+EDITOR_TILE/2,y*EDITOR_TILE+EDITOR_TILE/2+3);}
      if(t===EXIT){ec.fillStyle='#fff';ec.font='8px sans-serif';ec.textAlign='center';ec.fillText('🚪',x*EDITOR_TILE+EDITOR_TILE/2,y*EDITOR_TILE+EDITOR_TILE/2+3);}
    }
  }
}

function getCustomLevels(){ return JSON.parse(localStorage.getItem('maze_custom_levels')||'[]'); }
function saveCustomLevel(name, data){
  const levels = getCustomLevels();
  levels.push({name, data, date:new Date().toLocaleDateString('ar-EG')});
  localStorage.setItem('maze_custom_levels', JSON.stringify(levels));
}

function renderSavedLevels(){
  const el = document.getElementById('editor-saved-list');
  const levels = getCustomLevels();
  if(levels.length===0){el.innerHTML='<p style="color:#64748b;font-size:12px">لا توجد مستويات محفوظة</p>';return;}
  el.innerHTML = levels.map((l,i)=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(15,23,42,.6);border-radius:6px;margin:3px 0;font-size:12px">
      <span>${l.name} (${l.date||''})</span>
      <div>
        <button class="btn btn-small btn-primary ed-play" data-idx="${i}" style="padding:3px 8px;font-size:11px">تشغيل</button>
        <button class="btn btn-small btn-danger ed-del" data-idx="${i}" style="padding:3px 8px;font-size:11px">حذف</button>
      </div>
    </div>`
  ).join('');
  el.querySelectorAll('.ed-play').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx = parseInt(btn.dataset.idx);
      playCustomLevel(getCustomLevels()[idx].data);
    });
  });
  el.querySelectorAll('.ed-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx = parseInt(btn.dataset.idx);
      const levels = getCustomLevels();
      levels.splice(idx,1);
      localStorage.setItem('maze_custom_levels', JSON.stringify(levels));
      renderSavedLevels();
    });
  });
}

function playCustomLevel(mazeData){
  gameMode = 'custom';
  player2State = null;
  persist = {lives:5, weapons:[0,1,2], currentWeapon:0, speedBonus:0, score:0, level:1};

  const maze = JSON.parse(JSON.stringify(mazeData));
  const explored = Array.from({length:ROWS},()=>Array(COLS).fill(true));

  // Find player start and monsters
  let px=TILE+TILE/2, py=TILE+TILE/2;
  const monsterCells = [];
  const trapList = [];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    if(maze[y][x]===98){maze[y][x]=PATH;px=x*TILE+TILE/2;py=y*TILE+TILE/2;}
    if(maze[y][x]===99){maze[y][x]=PATH;monsterCells.push([x,y]);}
    if(maze[y][x]===TRAP_SPIKE||maze[y][x]===TRAP_LAVA||maze[y][x]===TRAP_ICE){
      trapList.push({x,y,type:maze[y][x],active:true,timer:0});
      maze[y][x]=PATH;
    }
  }

  const monsters = [];
  const types=['normal','fast','tank','shooter'];
  monsterCells.forEach(([cx,cy],i)=>{
    monsters.push(createMonster(cx,cy,types[i%types.length],i));
  });

  state = {
    maze, monsters, boss:null, doors:[], doorKeys:[], items:spawnItems(maze,3), traps:trapList, buttons:[], npcs:[],
    bullets:[], enemyBullets:[], particles:[],
    player:{x:px, y:py, dir:[1,0], invuln:0, shieldTimer:0, speedTimer:0, smoothX:px, smoothY:py, deathAnim:0, slideDir:null, slideTimer:0, buffTimer:0, buffType:null, ultimateCharge:0, ultimateActive:0, damageTaken:false, trapCooldown:0},
    keysCollected:{}, explored,
    score:0, lives:5, level:1,
    currentWeapon:0, weapons:[0,1,2],
    lastShot:0, gameOver:false, won:false, flash:0,
    timer:300*60, startTime:Date.now(),
    theme:getTheme(1),
    killsThisLevel:0,
    mode:'custom'
  };

  showScreen('game-screen');
  startFadeIn();
  if(raf) cancelAnimationFrame(raf);
  frame=0;
  loop();
}

// ── Input Handling ───────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  const k = e.key.toLowerCase();
  keys[k]=true;
  if(e.key === 'Enter') keys['enter']=true;
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
});
window.addEventListener('keyup',e=>{
  const k = e.key.toLowerCase();
  keys[k]=false;
  if(e.key === 'Enter') keys['enter']=false;
});

// Touch controls
function touchMove(dir){
  if(!state||state.gameOver||state.won) return;
  const p=state.player;
  p.dir=dir;
  const spd = 3+persist.speedBonus+(p.speedTimer>0?1.5:0);
  const nx=p.x+dir[0]*spd*4, ny=p.y+dir[1]*spd*4;
  if(canMove(state.maze,nx,ny)){p.x=nx;p.y=ny;}
}
function touchShoot(){
  if(!state||state.gameOver||state.won) return;
  const wep=WEAPONS[state.currentWeapon];
  const now=Date.now();
  if(now-state.lastShot<wep.fireRate) return;
  state.lastShot=now;
  const p=state.player;
  playSound(wep.id==='shotgun'?'shotgun':wep.id==='rapid'?'rapid':'shoot');
  for(let i=0;i<wep.count;i++){
    const angle=Math.atan2(p.dir[1],p.dir[0])+(wep.count>1?(i-Math.floor(wep.count/2))*wep.spread:(Math.random()-.5)*wep.spread*2);
    state.bullets.push({x:p.x,y:p.y,dx:Math.cos(angle)*wep.speed,dy:Math.sin(angle)*wep.speed,life:50,damage:wep.damage,color:wep.color,owner:1});
  }
}

document.getElementById('t-up').addEventListener('click',()=>touchMove([0,-1]));
document.getElementById('t-down').addEventListener('click',()=>touchMove([0,1]));
document.getElementById('t-left').addEventListener('click',()=>touchMove([-1,0]));
document.getElementById('t-right').addEventListener('click',()=>touchMove([1,0]));
document.getElementById('t-shoot').addEventListener('click',touchShoot);
document.getElementById('t-weapon').addEventListener('click',()=>{
  if(!state) return;
  const weps=state.weapons;
  const ci=weps.indexOf(state.currentWeapon);
  state.currentWeapon=weps[(ci+1)%weps.length];
});
document.getElementById('t-ult').addEventListener('click',()=>{

  activateUltimate(state, state.player);
});

  if(raf){cancelAnimationFrame(raf);raf=null;}
  document.getElementById('overlay').classList.remove('show');

// ── PWA Service Worker ───────────────────────────────────────────────
if('serviceWorker' in navigator){
  // Inline service worker via blob
  const swCode = `
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          const c = resp.clone();
          caches.open('maze-v1').then(cache => cache.put(e.request, c));
          return resp;
        }).catch(() => new Response('Offline', {status:503}))
      )
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
