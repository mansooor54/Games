<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',Tahoma,sans-serif;color:#e2e8f0;overflow:hidden;user-select:none}

#menu{background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0a1628 100%);gap:16px}
#menu::before{content:'';position:absolute;inset:0;opacity:.04;pointer-events:none;background-image:repeating-linear-gradient(0deg,#fff 0px,transparent 1px,transparent 32px),repeating-linear-gradient(90deg,#fff 0px,transparent 1px,transparent 32px)}

#menu p{color:#94a3b8;font-size:13px;text-align:center;max-width:360px;line-height:1.8}
.btn{padding:12px 40px;font-size:16px;font-weight:800;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:scale(1.05)}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#8b5cf6);box-shadow:0 0 25px rgba(59,130,246,.4)}
.btn-success{background:linear-gradient(135deg,#10b981,#3b82f6)}
.btn-warning{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626)}
.btn-info{background:linear-gradient(135deg,#06b6d4,#0284c7)}
.btn-small{padding:8px 20px;font-size:13px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
#settings-screen,#shop-screen,#story-screen,#leaderboard-screen,#achievements-screen,#worldmap-screen,#editor-screen,#survival-screen{background:rgba(0,0,0,.92);gap:16px;z-index:20}
.panel{background:rgba(30,41,59,.9);border:1px solid #334155;border-radius:12px;padding:20px;max-width:500px;width:90%;text-align:center;max-height:80vh;overflow-y:auto}
.panel h2{font-size:20px;margin-bottom:12px;color:#fbbf24}
.panel .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;font-size:14px}
.panel .row:last-child{border:none}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:10px;margin:6px 0;background:rgba(15,23,42,.6);border-radius:8px;font-size:13px}

#game-screen{z-index:5;padding:0}
#game-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{border-radius:6px;display:block;image-rendering:pixelated}
#touch-controls{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:6px}
#touch-controls .row{display:flex;gap:4px}
.tbtn{width:46px;height:46px;font-size:18px;background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;-webkit-tap-highlight-color:transparent}
.tbtn.shoot{background:rgba(251,191,36,.3);color:#fbbf24;width:50px}

#overlay{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:30;gap:14px}

#overlay-sub{font-size:15px;color:#94a3b8}

#story-text{font-size:15px;color:#cbd5e1;line-height:2;max-width:380px;text-align:center;padding:20px}
.lb-entry{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid #1e293b}

.achieve-item.locked{background:rgba(30,41,59,.4);border:1px solid #1e293b;opacity:.6}
.achieve-name{font-weight:700;color:#fbbf24}

#achievement-popup{position:fixed;top:-80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(34,197,94,.9),rgba(16,185,129,.9));color:#fff;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;z-index:100;transition:top .5s ease;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}

.worldmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.wm-cell{width:50px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:default;border:2px solid #334155}
.wm-cell.completed{background:rgba(34,197,94,.3);border-color:#22c55e;color:#22c55e}
.wm-cell.current{background:rgba(59,130,246,.3);border-color:#3b82f6;color:#3b82f6;animation:pulse-border 1s infinite}
.wm-cell.locked{background:rgba(30,41,59,.3);color:#475569}
@keyframes pulse-border{0%,100%{box-shadow:0 0 5px rgba(59,130,246,.3)}50%{box-shadow:0 0 15px rgba(59,130,246,.6)}}
#editor-canvas{border:2px solid #334155;border-radius:6px;cursor:crosshair;display:block;margin:10px auto}
.editor-toolbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.editor-toolbar .tbtn{width:auto;padding:6px 12px;font-size:12px;height:auto}
.editor-toolbar .tbtn.active{background:rgba(251,191,36,.4);border-color:#fbbf24}
.fullscreen-btn{position:fixed;top:8px;left:8px;z-index:50;background:rgba(0,0,0,.5);color:#fff;border:1px solid #334155;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px}

<body>

<div class="screen active" id="menu">

  </div>
</div>

<div class="screen" id="settings-screen">
  <div class="panel">
    <h2>الإعدادات</h2>
    <div class="row"><span>الصوت</span><button class="btn btn-small btn-primary" id="snd-toggle">مفعّل</button></div>
    <div class="row"><span>الصعوبة</span><button class="btn btn-small btn-warning" id="diff-toggle">عادي</button></div>
  </div>
  <button class="btn btn-primary" id="settings-back">رجوع</button>

<div class="screen" id="leaderboard-screen">

    <h2>أفضل النتائج</h2>

  <button class="btn btn-primary" id="lb-back">رجوع</button>
</div>

<div class="screen" id="achievements-screen">
  <div class="panel">
    <h2>الإنجازات</h2>

<div class="screen" id="worldmap-screen">

  </div>

<div class="screen" id="story-screen">

    <div id="story-text"></div>
  </div>

<div class="screen" id="shop-screen">

    <h2>المتجر</h2>
    <div id="shop-score" style="color:#fbbf24;margin-bottom:10px;font-size:14px"></div>
    <div id="shop-items"></div>
  </div>

    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-small btn-success" id="editor-save">حفظ</button>
      <button class="btn btn-small btn-primary" id="editor-play">تجربة</button>

      <button class="tbtn" id="t-left">◄</button>

</div>

<div id="overlay">
  <div id="overlay-msg"></div>
  <div id="overlay-sub"></div>
  <div id="overlay-score"></div>

    <button class="btn btn-primary" id="retry-btn">حاول مرة أخرى</button>
    <button class="btn btn-warning" id="menu-btn-overlay">القائمة</button>
  </div>
</div>

<script>
// =====================================================================
// MAZE ESCAPE GAME - Complete Rewrite with All Features
// =====================================================================
'use strict';

// ── Constants ────────────────────────────────────────────────────────
const TILE = 32, COLS = 25, ROWS = 19;
const W = COLS * TILE, H = ROWS * TILE;
const WALL = 1, PATH = 0, EXIT = 2, DOOR_R = 3, DOOR_B = 4, DOOR_G = 5;
const TRAP_SPIKE = 10, TRAP_LAVA = 11, TRAP_ICE = 12;
const BUTTON_TILE = 13;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// ── Settings ─────────────────────────────────────────────────────────
let settings = JSON.parse(localStorage.getItem('maze_settings') || '{"sound":true,"difficulty":1}');
const DIFF_NAMES = ['سهل','عادي','صعب'];
const DIFF_MULT = [0.7, 1.0, 1.4];

// ── Audio Engine (Web Audio API) ─────────────────────────────────────
let audioCtx = null;
function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playSound(type){
  if(!settings.sound) return;
  const ac = ensureAudio();
  const now = ac.currentTime;
  const g = ac.createGain();
  g.connect(ac.destination);

  if(type==='shoot'){
    const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(200,now+.08);
    g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);
    o.connect(g);o.start(now);o.stop(now+.1);
  } else if(type==='shotgun'){
    for(let i=0;i<3;i++){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(600+Math.random()*400,now+i*.02);o.frequency.exponentialRampToValueAtTime(100,now+.12);const g2=ac.createGain();g2.gain.setValueAtTime(.1,now);g2.gain.exponentialRampToValueAtTime(.001,now+.12);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.02);o.stop(now+.15);}
    return;
  } else if(type==='rapid'){
    const o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(400,now+.05);
    g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.06);
    o.connect(g);o.start(now);o.stop(now+.06);
  } else if(type==='monster_die'){
    const o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(80,now+.3);
    g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
    o.connect(g);o.start(now);o.stop(now+.3);
  } else if(type==='pickup'){
    const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(1200,now+.15);
    g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
    o.connect(g);o.start(now);o.stop(now+.2);
  } else if(type==='damage'){
    const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(50,now+.2);
    g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
    o.connect(g);o.start(now);o.stop(now+.25);
  } else if(type==='win'){
    [523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.1,now+i*.12);g2.gain.exponentialRampToValueAtTime(.001,now+i*.12+.3);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.12);o.stop(now+i*.12+.3);});
    return;
  } else if(type==='lose'){
    [300,250,200,150].forEach((f,i)=>{const o=ac.createOscillator();o.type='sawtooth';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.12,now+i*.15);g2.gain.exponentialRampToValueAtTime(.001,now+i*.15+.25);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.15);o.stop(now+i*.15+.25);});
    return;
  } else if(type==='footstep'){
    const o=ac.createOscillator();o.type='triangle';o.frequency.setValueAtTime(80+Math.random()*40,now);
    g.gain.setValueAtTime(.03,now);g.gain.exponentialRampToValueAtTime(.001,now+.05);
    o.connect(g);o.start(now);o.stop(now+.05);
  } else if(type==='key'){
    [800,1000,1200].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.1,now+i*.08);g2.gain.exponentialRampToValueAtTime(.001,now+i*.08+.15);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.08);o.stop(now+i*.08+.15);});
    return;
  } else if(type==='door'){
    const o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(200,now);o.frequency.exponentialRampToValueAtTime(600,now+.2);
    g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
    o.connect(g);o.start(now);o.stop(now+.25);
  } else if(type==='boss_die'){
    for(let i=0;i<5;i++){const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(300-i*40,now+i*.1);o.frequency.exponentialRampToValueAtTime(50,now+i*.1+.2);const g2=ac.createGain();g2.gain.setValueAtTime(.15,now+i*.1);g2.gain.exponentialRampToValueAtTime(.001,now+i*.1+.25);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.1);o.stop(now+i*.1+.25);}
    return;
  } else if(type==='boss_attack'){
    const o=ac.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(100,now);o.frequency.exponentialRampToValueAtTime(300,now+.15);o.frequency.exponentialRampToValueAtTime(80,now+.3);
    g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.35);
    o.connect(g);o.start(now);o.stop(now+.35);
  } else if(type==='ultimate'){
    [200,400,600,800,1000].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.12,now+i*.06);g2.gain.exponentialRampToValueAtTime(.001,now+i*.06+.3);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.06);o.stop(now+i*.06+.3);});
    return;
  } else if(type==='rescue'){
    [600,800,1000,1200].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.1,now+i*.1);g2.gain.exponentialRampToValueAtTime(.001,now+i*.1+.2);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.1);o.stop(now+i*.1+.2);});
    return;
  } else if(type==='trap'){
    const o=ac.createOscillator();o.type='square';o.frequency.setValueAtTime(100,now);o.frequency.exponentialRampToValueAtTime(60,now+.15);
    g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
    o.connect(g);o.start(now);o.stop(now+.2);
  } else if(type==='button'){
    const o=ac.createOscillator();o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(900,now+.1);
    g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);
    o.connect(g);o.start(now);o.stop(now+.15);
  } else if(type==='achieve'){
    [523,659,784,1047,1318].forEach((f,i)=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g2=ac.createGain();g2.gain.setValueAtTime(.08,now+i*.1);g2.gain.exponentialRampToValueAtTime(.001,now+i*.1+.25);o.connect(g2);g2.connect(ac.destination);o.start(now+i*.1);o.stop(now+i*.1+.25);});
    return;
  }
}

// ── Level Themes ─────────────────────────────────────────────────────

// ── Cinematic Level Fade ─────────────────────────────────────────────
function startFadeOut(callback){
  levelFade.alpha = 0; levelFade.dir = 1; levelFade.callback = callback;
}
function startFadeIn(){
  levelFade.alpha = 1; levelFade.dir = -1; levelFade.callback = null;
}
function updateFade(){
  if(levelFade.dir !== 0){
    levelFade.alpha += levelFade.dir * 0.03;
    if(levelFade.alpha >= 1 && levelFade.dir === 1){
      levelFade.alpha = 1; levelFade.dir = 0;
      if(levelFade.callback) { levelFade.callback(); levelFade.callback = null; startFadeIn(); }
    }
    if(levelFade.alpha <= 0 && levelFade.dir === -1){
      levelFade.alpha = 0; levelFade.dir = 0;
    }
  }
}
function drawFade(ctx){
  if(levelFade.alpha > 0){
    ctx.fillStyle = `rgba(0,0,0,${levelFade.alpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ── Maze Generation ──────────────────────────────────────────────────
function generateMaze(cols, rows){
  const maze = Array.from({length:rows},()=>Array(cols).fill(WALL));
  const stack = [[1,1]];
  maze[1][1] = PATH;
  while(stack.length>0){
    const [x,y] = stack[stack.length-1];
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]];
    for(let i=dirs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
    let found = false;
    for(const [dx,dy] of dirs){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&nx<cols-1&&ny>0&&ny<rows-1&&maze[ny][nx]===WALL){
        maze[y+dy/2][x+dx/2]=PATH; maze[ny][nx]=PATH;
        stack.push([nx,ny]); found=true; break;
      }
    }
    if(!found) stack.pop();
  }
  for(let i=0;i<Math.floor(cols*rows*0.03);i++){
    const x=2+Math.floor(Math.random()*(cols-4));
    const y=2+Math.floor(Math.random()*(rows-4));
    if(maze[y][x]===WALL){
      let adj=0;
      if(y>0&&maze[y-1][x]===PATH)adj++;
      if(y<rows-1&&maze[y+1][x]===PATH)adj++;
      if(x>0&&maze[y][x-1]===PATH)adj++;
      if(x<cols-1&&maze[y][x+1]===PATH)adj++;
      if(adj>=2) maze[y][x]=PATH;
    }
  }
  maze[rows-2][cols-2]=EXIT;
  return maze;
}

// ── Place Doors & Keys ───────────────────────────────────────────────
function placeDoors(maze, level){
  const doors=[], doorKeys=[];
  if(level<2) return {doors, doorKeys};

  const numDoors = Math.min(3, Math.floor(level/2));
  const doorTypes = [DOOR_R, DOOR_B, DOOR_G];
  const doorColors = ['#ef4444','#3b82f6','#22c55e'];
  const keyEmojis = ['🔴','🔵','🟢'];

  const pathCells = [];
  for(let y=2;y<ROWS-2;y++) for(let x=2;x<COLS-2;x++){
    if(maze[y][x]===PATH && !(x===1&&y===1) && !(x===COLS-2&&y===ROWS-2)){
      const h = maze[y][x-1]===WALL && maze[y][x+1]===WALL;
      const v = maze[y-1]&&maze[y-1][x]===WALL && maze[y+1]&&maze[y+1][x]===WALL;
      if(h||v) pathCells.push({x,y,dist:Math.abs(x-1)+Math.abs(y-1)});
    }
  }
  pathCells.sort((a,b)=>a.dist-b.dist);

  const mid = Math.floor(pathCells.length*0.3);
  const candidates = pathCells.slice(mid, mid+Math.max(20,pathCells.length-mid));
  candidates.sort(()=>Math.random()-.5);

  for(let i=0;i<numDoors&&i<candidates.length;i++){
    const c = candidates[i];
    maze[c.y][c.x] = doorTypes[i];
    doors.push({x:c.x, y:c.y, type:doorTypes[i], color:doorColors[i], open:false});

    const keyCandidates = [];
    for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
      if(maze[y][x]===PATH && !(x===1&&y===1)){
        const d = Math.abs(x-1)+Math.abs(y-1);
        if(d < c.dist && d > 3) keyCandidates.push({x,y});
      }
    }
    if(keyCandidates.length>0){
      const kc = keyCandidates[Math.floor(Math.random()*keyCandidates.length)];
      doorKeys.push({x:kc.x*TILE+TILE/2, y:kc.y*TILE+TILE/2, type:doorTypes[i], color:doorColors[i], emoji:keyEmojis[i], collected:false});
    }
  }
  return {doors, doorKeys};
}

// ── Floor Traps ──────────────────────────────────────────────────────
function placeTraps(maze, level){
  const traps = [];
  if(level < 2) return traps;
  const pathCells = [];
  for(let y=2;y<ROWS-2;y++) for(let x=2;x<COLS-2;x++){
    if(maze[y][x]===PATH && !(x===1&&y===1) && !(x===COLS-2&&y===ROWS-2))
      pathCells.push({x,y});
  }
  pathCells.sort(()=>Math.random()-.5);
  const count = Math.min(pathCells.length, 3 + Math.floor(level * 1.5));
  const trapTypes = [TRAP_SPIKE, TRAP_LAVA, TRAP_ICE];
  for(let i=0;i<count&&i<pathCells.length;i++){
    const c = pathCells[i];
    const tt = trapTypes[Math.floor(Math.random()*trapTypes.length)];
    traps.push({x:c.x, y:c.y, type:tt, active:true, timer:0});
  }
  return traps;
}

// ── Pressure Buttons & Secret Passages ───────────────────────────────
function placeButtons(maze, level){
  const buttons = [];
  if(level < 3) return buttons;
  const pathCells = [];
  for(let y=2;y<ROWS-2;y++) for(let x=2;x<COLS-2;x++){
    if(maze[y][x]===PATH && !(x===1&&y===1) && !(x===COLS-2&&y===ROWS-2))
      pathCells.push({x,y});
  }
  pathCells.sort(()=>Math.random()-.5);

  const wallCells = [];
  for(let y=2;y<ROWS-2;y++) for(let x=2;x<COLS-2;x++){
    if(maze[y][x]===WALL){
      let adjPath = 0;
      if(maze[y-1]&&maze[y-1][x]===PATH)adjPath++;
      if(maze[y+1]&&maze[y+1][x]===PATH)adjPath++;
      if(maze[y][x-1]===PATH)adjPath++;
      if(maze[y][x+1]===PATH)adjPath++;
      if(adjPath >= 1 && adjPath <= 2) wallCells.push({x,y});
    }
  }
  wallCells.sort(()=>Math.random()-.5);

  const count = Math.min(2, pathCells.length, wallCells.length);
  for(let i=0;i<count;i++){
    buttons.push({
      bx: pathCells[i].x, by: pathCells[i].y,
      wx: wallCells[i].x, wy: wallCells[i].y,
      pressed: false
    });
  }
  return buttons;
}

// ── Rescue NPCs ──────────────────────────────────────────────────────
function placeNPCs(maze, level){
  const npcs = [];
  if(level < 2) return npcs;
  const deadEnds = [];
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(maze[y][x]===PATH && !(x===1&&y===1) && !(x===COLS-2&&y===ROWS-2)){
      let exits = 0;
      if(maze[y-1]&&maze[y-1][x]!==WALL)exits++;
      if(maze[y+1]&&maze[y+1][x]!==WALL)exits++;
      if(maze[y][x-1]!==WALL)exits++;
      if(maze[y][x+1]!==WALL)exits++;
      if(exits === 1) deadEnds.push({x,y});
    }
  }
  deadEnds.sort(()=>Math.random()-.5);
  const count = Math.min(deadEnds.length, 1 + Math.floor(level/3));
  for(let i=0;i<count;i++){
    const c = deadEnds[i];
    npcs.push({x:c.x*TILE+TILE/2, y:c.y*TILE+TILE/2, rescued:false, bob:Math.random()*Math.PI*2});
  }
  return npcs;
}

// ── Spawn Items ──────────────────────────────────────────────────────
function spawnItems(maze, level){
  const cells=[];
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(maze[y][x]===PATH && !(x===1&&y===1) && Math.abs(x-COLS+2)+Math.abs(y-ROWS+2)>3)
      cells.push({x,y});
  }
  cells.sort(()=>Math.random()-.5);

  const items=[];
  const types = [
    {type:'health', emoji:'❤️', color:'#ef4444'},
    {type:'shield', emoji:'🛡️', color:'#60a5fa'},
    {type:'speed',  emoji:'⚡', color:'#fbbf24'},
    {type:'coin',   emoji:'💰', color:'#f59e0b'}
  ];

  const count = Math.min(cells.length, 5 + level);
  for(let i=0;i<count;i++){
    const c=cells[i];
    const t = i<2 ? types[3] : types[Math.floor(Math.random()*types.length)];
    items.push({x:c.x*TILE+TILE/2, y:c.y*TILE+TILE/2, ...t, active:true, bob:Math.random()*Math.PI*2});
  }
  return items;
}

// ── Monster Types ────────────────────────────────────────────────────
function createMonster(x, y, type, id){
  const base = {id, x:x*TILE+TILE/2, y:y*TILE+TILE/2, alive:true, dir:[[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)], moveTimer:0, hit:0, deathAnim:0, type, frozen:0};
  if(type==='normal') return {...base, hp:1, maxHp:1, speed:1, color:'#ef4444', score:10};
  if(type==='fast')   return {...base, hp:1, maxHp:1, speed:2, color:'#22c55e', score:15};
  if(type==='tank')   return {...base, hp:3, maxHp:3, speed:0.5, color:'#a855f7', score:25};
  if(type==='shooter')return {...base, hp:2, maxHp:2, speed:0.7, color:'#f97316', score:20, shootTimer:0};
  return base;
}

function spawnMonsters(maze, level){
  const cells=[];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    if(maze[y][x]===PATH && Math.abs(x-1)+Math.abs(y-1)>8) cells.push([x,y]);
  }
  cells.sort(()=>Math.random()-.5);

  const dm = DIFF_MULT[settings.difficulty];
  const count = Math.floor((3+level*2)*dm);
  const monsters=[];
  const types = ['normal','normal','fast','tank','shooter'];

  for(let i=0;i<Math.min(count,cells.length);i++){
    const [cx,cy]=cells[i];
    let t = types[Math.floor(Math.random()*types.length)];
    if(level<2) t='normal';
    else if(level<4 && t==='shooter') t='normal';
    monsters.push(createMonster(cx,cy,t,i));
  }
  return monsters;
}

// ── Boss ─────────────────────────────────────────────────────────────
function spawnBoss(maze, level){
  const cx = Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  let bx=cx, by=cy;
  for(let r=0;r<10;r++){
    for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
      const x=cx+dx, y=cy+dy;
      if(x>1&&x<COLS-2&&y>1&&y<ROWS-2&&maze[y][x]===PATH) { bx=x; by=y; r=999; break; }
    }
  }
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    if(by+dy>0&&by+dy<ROWS-1&&bx+dx>0&&bx+dx<COLS-1) maze[by+dy][bx+dx]=PATH;
  }
  const hp = 10 + level * 5;
  return {
    x:bx*TILE+TILE/2, y:by*TILE+TILE/2,
    hp, maxHp:hp, alive:true, frozen:0,
    phase:0, timer:0, attackTimer:0,
    moveDir:[1,0], moveTimer:0,
    deathAnim:0, hit:0,
    color: level<=3?'#dc2626':level<=6?'#ea580c':level<=9?'#16a34a':'#7c3aed'
  };
}

// ── Collision ────────────────────────────────────────────────────────
function canMove(maze, px, py, radius){
  const r = radius||10;
  return [[px-r,py-r],[px+r,py-r],[px-r,py+r],[px+r,py+r]].every(([cx,cy])=>{
    const gx=Math.floor(cx/TILE), gy=Math.floor(cy/TILE);
    if(gx<0||gx>=COLS||gy<0||gy>=ROWS) return false;
    const t=maze[gy][gx];
    return t!==WALL && t!==DOOR_R && t!==DOOR_B && t!==DOOR_G;
  });
}

// ── Explored map for minimap ─────────────────────────────────────────
function updateExplored(explored, px, py, radius){
  const cx=Math.floor(px/TILE), cy=Math.floor(py/TILE);
  const r=Math.ceil(radius/TILE)+1;
  for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){
    const x=cx+dx, y=cy+dy;
    if(x>=0&&x<COLS&&y>=0&&y<ROWS) explored[y][x]=true;
  }
}

// ── Init Level ───────────────────────────────────────────────────────
function initLevel(lvl, score, lives){
  const maze = generateMaze(COLS, ROWS);
  const isBossLevel = (lvl%3===0 && lvl>0);
  const {doors, doorKeys} = placeDoors(maze, lvl);
  const items = spawnItems(maze, lvl);
  const monsters = isBossLevel ? spawnMonsters(maze, Math.max(1,lvl-2)) : spawnMonsters(maze, lvl);
  const boss = isBossLevel ? spawnBoss(maze, lvl) : null;
  const explored = Array.from({length:ROWS},()=>Array(COLS).fill(false));
  const traps = placeTraps(maze, lvl);
  const buttons = placeButtons(maze, lvl);
  const npcs = placeNPCs(maze, lvl);

  state = {
    maze, monsters, boss, doors, doorKeys, items, traps, buttons, npcs,
    bullets:[], enemyBullets:[], particles:[],
    player:{x:TILE+TILE/2, y:TILE+TILE/2, dir:[1,0], invuln:0, shieldTimer:0, speedTimer:0, smoothX:TILE+TILE/2, smoothY:TILE+TILE/2, deathAnim:0, slideDir:null, slideTimer:0, buffTimer:0, buffType:null, ultimateCharge:0, ultimateActive:0, damageTaken:false, trapCooldown:0},

// ── Survival Mode ────────────────────────────────────────────────────
function generateArena(){
  const maze = Array.from({length:ROWS},()=>Array(COLS).fill(PATH));
  // Walls around border
  for(let x=0;x<COLS;x++){maze[0][x]=WALL;maze[ROWS-1][x]=WALL;}
  for(let y=0;y<ROWS;y++){maze[y][0]=WALL;maze[y][COLS-1]=WALL;}
  // Some internal walls for cover
  for(let i=0;i<15;i++){
    const x = 3+Math.floor(Math.random()*(COLS-6));
    const y = 3+Math.floor(Math.random()*(ROWS-6));
    maze[y][x]=WALL;
    if(Math.random()>.5 && x+1<COLS-1) maze[y][x+1]=WALL;
    if(Math.random()>.5 && y+1<ROWS-1) maze[y+1][x]=WALL;
  }
  return maze;
}

function initSurvival(){
  const maze = generateArena();
  const explored = Array.from({length:ROWS},()=>Array(COLS).fill(true));
  survivalStats = {wave:0, score:0, monstersKilled:0};

  state = {
    maze, monsters:[], boss:null, doors:[], doorKeys:[], items:[], traps:[], buttons:[], npcs:[],
    bullets:[], enemyBullets:[], particles:[],
    player:{x:Math.floor(COLS/2)*TILE+TILE/2, y:Math.floor(ROWS/2)*TILE+TILE/2, dir:[1,0], invuln:0, shieldTimer:0, speedTimer:0, smoothX:Math.floor(COLS/2)*TILE+TILE/2, smoothY:Math.floor(ROWS/2)*TILE+TILE/2, deathAnim:0, slideDir:null, slideTimer:0, buffTimer:0, buffType:null, ultimateCharge:0, ultimateActive:0, damageTaken:false, trapCooldown:0},
    keysCollected:{}, explored,
    score:0, lives:5, level:1,
    currentWeapon:0, weapons:[0,1,2],
    lastShot:0, gameOver:false, won:false, flash:0,
    timer:Infinity, startTime:Date.now(),
    theme:getTheme(1),
    killsThisLevel:0,
    mode:'survival',
    survivalWave:0, survivalWaveTimer:0, survivalSpawnTimer:0
  };
  spawnSurvivalWave();
}

function spawnSurvivalWave(){
  if(!state || state.mode !== 'survival') return;
  state.survivalWave++;
  survivalStats.wave = state.survivalWave;
  const wave = state.survivalWave;
  const dm = DIFF_MULT[settings.difficulty];
  const count = Math.floor((3 + wave * 2) * dm);
  const types = ['normal','fast','tank','shooter'];
  const cells = [];
  for(let y=1;y<ROWS-1;y++) for(let x=1;x<COLS-1;x++){
    if(state.maze[y][x]===PATH){
      const dist = Math.abs(x*TILE+TILE/2 - state.player.x) + Math.abs(y*TILE+TILE/2 - state.player.y);
      if(dist > TILE*5) cells.push([x,y]);
    }
  }
  cells.sort(()=>Math.random()-.5);
  const baseId = state.monsters.length;
  for(let i=0;i<Math.min(count,cells.length);i++){
    const [cx,cy]=cells[i];
    let t = types[Math.floor(Math.random()*types.length)];
    if(wave < 3) t = Math.random()>.3?'normal':'fast';
    const m = createMonster(cx,cy,t,baseId+i);
    m.hp = Math.ceil(m.hp * (1 + wave*0.1));
    m.maxHp = m.hp;
    state.monsters.push(m);
  }
  // Drop items
  if(wave % 2 === 0 && cells.length > count){
    const ic = cells[count];
    state.items.push({x:ic[0]*TILE+TILE/2,y:ic[1]*TILE+TILE/2,type:'health',emoji:'❤️',color:'#ef4444',active:true,bob:0});
  }
  state.survivalWaveTimer = 180; // display wave number for 3 sec
}

// ── Shop ─────────────────────────────────────────────────────────────
function openShop(){
  const el = document.getElementById('shop-items');
  const scoreEl = document.getElementById('shop-score');

  function render(){
    scoreEl.textContent = `النقاط المتاحة: ${persist.score}`;
    const shopItems = [
      {name:'حياة إضافية ❤️', cost:100, action:()=>{persist.lives++;}, always:true},
      {name:'بندقية 🔫', cost:200, action:()=>{if(!persist.weapons.includes(1))persist.weapons.push(1);}, check:()=>!persist.weapons.includes(1)},
      {name:'رشاش 🔫', cost:300, action:()=>{if(!persist.weapons.includes(2))persist.weapons.push(2);}, check:()=>!persist.weapons.includes(2)},
      {name:'سرعة دائمة ⚡', cost:150, action:()=>{persist.speedBonus=Math.min(persist.speedBonus+0.5,2);}, always:true},
    ];

    el.innerHTML = shopItems.filter(s=>s.always||s.check()).map((item,i)=>{
      const canBuy = persist.score>=item.cost;
      return `<div class="shop-item"><span>${item.name}</span><span class="cost">${item.cost} ⭐</span><button class="btn btn-small btn-success shop-buy" data-idx="${i}" ${canBuy?'':'disabled'}>شراء</button></div>`;
    }).join('');

    el.querySelectorAll('.shop-buy').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const idx=parseInt(btn.dataset.idx);
        const available = shopItems.filter(s=>s.always||s.check());
        const item = available[idx];
        if(item && persist.score>=item.cost){
          persist.score-=item.cost;
          item.action();
          playSound('pickup');
          render();
        }
      });
    });
  }
  render();
  showScreen('shop-screen');
}

// ── Show Story ───────────────────────────────────────────────────────
function showStory(lvl, callback){
  const idx = Math.min(lvl-1, STORIES.length-1);

  document.getElementById('story-text').textContent = STORIES[idx];

// ── Drawing Helpers ──────────────────────────────────────────────────
function drawMonsterShape(c, m, wobble){
  c.save();
  c.translate(m.x, m.y+wobble);

  if(m.frozen > 0){
    c.globalAlpha = 0.7;
    c.fillStyle = '#88ccff';
    c.beginPath();c.arc(0,0,14,0,Math.PI*2);c.fill();
    c.globalAlpha = 1;
  }

  if(m.hit>0){c.globalAlpha=0.5+Math.sin(frame*0.5)*0.3;}

  const sz = m.type==='tank'?14:10;
  c.fillStyle=m.color;
  c.beginPath();
  c.moveTo(-sz,sz);c.lineTo(-sz,-sz*0.4);
  c.quadraticCurveTo(-sz,-sz*1.2,0,-sz*1.2);
  c.quadraticCurveTo(sz,-sz*1.2,sz,-sz*0.4);
  c.lineTo(sz,sz);
  for(let i=0;i<5;i++){const lx=-sz+i*(sz*2/5);c.lineTo(lx+sz/5,sz-4);c.lineTo(lx+sz*2/5,sz);}
  c.fill();

  // Eyes
  c.fillStyle='#fff';
  c.beginPath();c.arc(-sz*0.35,-sz*0.3,sz*0.25,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(sz*0.35,-sz*0.3,sz*0.25,0,Math.PI*2);c.fill();
  c.fillStyle='#1e1e2e';
  c.beginPath();c.arc(-sz*0.25,-sz*0.2,sz*0.13,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(sz*0.45,-sz*0.2,sz*0.13,0,Math.PI*2);c.fill();

  if(m.type==='fast'){
    c.strokeStyle='#fff';c.lineWidth=1;
    c.beginPath();c.moveTo(-sz-3,-2);c.lineTo(-sz-7,-2);c.stroke();
    c.beginPath();c.moveTo(-sz-2,3);c.lineTo(-sz-6,3);c.stroke();
  }
  if(m.type==='tank'){
    c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=2;
    c.beginPath();c.moveTo(-sz+2,0);c.lineTo(sz-2,0);c.stroke();
  }
  if(m.type==='shooter'){
    c.fillStyle='#333';
    c.fillRect(sz-2,-2,6,4);
  }

  if(m.type==='tank'||m.type==='shooter'){
    const bw=sz*2, bh=3;
    c.fillStyle='rgba(0,0,0,0.5)';c.fillRect(-bw/2,-sz*1.5,bw,bh);
    c.fillStyle=m.color;c.fillRect(-bw/2,-sz*1.5,bw*(m.hp/m.maxHp),bh);
  }

  c.restore();
}

function drawBoss(c, b){
  if(!b||!b.alive) return;
  c.save();
  c.translate(b.x, b.y);

  if(b.frozen > 0){
    c.globalAlpha = 0.6;
    c.fillStyle = '#88ccff';
    c.beginPath();c.arc(0,0,28,0,Math.PI*2);c.fill();
    c.globalAlpha = 1;
  }

  const pulse = Math.sin(frame*0.05)*3;
  const sz = 22+pulse;

  if(b.hit>0) c.globalAlpha=0.5+Math.sin(frame*0.5)*0.3;

  c.fillStyle=b.color;
  c.beginPath();
  c.moveTo(-sz,sz);c.lineTo(-sz,-sz*0.3);
  c.quadraticCurveTo(-sz,-sz*1.3,0,-sz*1.3);
  c.quadraticCurveTo(sz,-sz*1.3,sz,-sz*0.3);
  c.lineTo(sz,sz);
  for(let i=0;i<7;i++){const lx=-sz+i*(sz*2/7);c.lineTo(lx+sz/7,sz-5);c.lineTo(lx+sz*2/7,sz);}
  c.fill();

  c.fillStyle=b.color;
  c.beginPath();c.moveTo(-sz*0.6,-sz*1.3);c.lineTo(-sz*0.4,-sz*1.8);c.lineTo(-sz*0.2,-sz*1.3);c.fill();
  c.beginPath();c.moveTo(sz*0.2,-sz*1.3);c.lineTo(sz*0.4,-sz*1.8);c.lineTo(sz*0.6,-sz*1.3);c.fill();

  c.fillStyle='#fff';
  c.beginPath();c.arc(-8,-6,5,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(8,-6,5,0,Math.PI*2);c.fill();
  c.fillStyle='#ff0000';
  c.beginPath();c.arc(-7,-5,2.5,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(9,-5,2.5,0,Math.PI*2);c.fill();

  const bw=50, bh=6;
  c.fillStyle='rgba(0,0,0,0.7)';c.fillRect(-bw/2,-sz*2,bw,bh);
  c.fillStyle='#ef4444';c.fillRect(-bw/2,-sz*2,bw*(b.hp/b.maxHp),bh);
  c.strokeStyle='#fff';c.lineWidth=0.5;c.strokeRect(-bw/2,-sz*2,bw,bh);

  c.restore();
}

function drawPlayer(c, px, py, pdir, weaponIdx, shieldTimer, speedTimer, isP2){
  c.save();
  c.translate(px, py);

  if(shieldTimer>0){
    c.strokeStyle=`rgba(96,165,250,${0.4+Math.sin(frame*0.1)*0.2})`;
    c.lineWidth=2;
    c.beginPath();c.arc(0,0,16,0,Math.PI*2);c.stroke();
  }

  if(speedTimer>0){
    c.fillStyle='rgba(251,191,36,0.15)';
    c.beginPath();c.arc(0,0,14,0,Math.PI*2);c.fill();
  }

  c.fillStyle = isP2 ? '#22c55e' : '#3b82f6';
  c.beginPath();c.arc(0,0,11,0,Math.PI*2);c.fill();
  c.fillStyle = isP2 ? '#4ade80' : '#60a5fa';
  c.beginPath();c.arc(-3,-3,4,0,Math.PI*2);c.fill();

  const wep = WEAPONS[weaponIdx||0];
  c.strokeStyle=wep.color;c.lineWidth=2;
  c.beginPath();c.moveTo(0,0);c.lineTo(pdir[0]*14,pdir[1]*14);c.stroke();

  c.restore();
}

// ── Draw Wall with 3D shadows ────────────────────────────────────────
function drawWall3D(c, tx, ty, theme, maze, x, y){
  c.fillStyle = theme.wall;
  c.fillRect(tx, ty, TILE, TILE);

  // Top border (lighter)
  c.strokeStyle = theme.wallBorder;
  c.lineWidth = 1;
  c.beginPath();c.moveTo(tx, ty);c.lineTo(tx+TILE, ty);c.stroke();
  c.beginPath();c.moveTo(tx, ty);c.lineTo(tx, ty+TILE);c.stroke();

  // Bottom/right shadow (darker)
  c.fillStyle = theme.wallShadow;
  // Right shadow
  if(x+1<COLS && maze[y][x+1]!==WALL){
    c.fillRect(tx+TILE-3, ty, 3, TILE);
  }
  // Bottom shadow
  if(y+1<ROWS && maze[y+1][x]!==WALL){
    c.fillRect(tx, ty+TILE-3, TILE, 3);
  }

  // Inner highlight
  c.strokeStyle = theme.wallBorder;
  c.lineWidth = 0.5;
  c.strokeRect(tx+2, ty+2, TILE-4, TILE-4);
}

// ── Draw Trap ────────────────────────────────────────────────────────
function drawTrap(c, trap){
  const tx = trap.x * TILE, ty = trap.y * TILE;
  if(trap.type === TRAP_SPIKE){
    c.fillStyle = 'rgba(120,120,120,0.6)';
    for(let i=0;i<3;i++){
      const sx = tx + 4 + i*10;
      c.beginPath();c.moveTo(sx, ty+TILE-4);c.lineTo(sx+5, ty+8);c.lineTo(sx+10, ty+TILE-4);c.fill();
    }
  } else if(trap.type === TRAP_LAVA){
    const pulse = Math.sin(frame*0.08 + trap.x)*0.2 + 0.6;
    c.fillStyle = `rgba(239,68,68,${pulse})`;
    c.fillRect(tx+2, ty+2, TILE-4, TILE-4);
    c.fillStyle = `rgba(249,115,22,${pulse*0.7})`;
    c.fillRect(tx+6, ty+6, TILE-12, TILE-12);
    // Bubbles
    const bx = tx + 8 + Math.sin(frame*0.1+trap.x)*8;
    const by = ty + 10 + Math.cos(frame*0.13+trap.y)*6;
    c.fillStyle = 'rgba(251,191,36,0.5)';
    c.beginPath();c.arc(bx,by,2,0,Math.PI*2);c.fill();
  } else if(trap.type === TRAP_ICE){
    c.fillStyle = 'rgba(34,211,238,0.3)';
    c.fillRect(tx+1, ty+1, TILE-2, TILE-2);
    c.strokeStyle = 'rgba(165,243,252,0.5)';
    c.lineWidth = 1;
    c.beginPath();c.moveTo(tx+4,ty+8);c.lineTo(tx+TILE-4,ty+TILE-8);c.stroke();
    c.beginPath();c.moveTo(tx+TILE-4,ty+4);c.lineTo(tx+8,ty+TILE-4);c.stroke();
  }
}

// ── Draw NPC ─────────────────────────────────────────────────────────
function drawNPC(c, npc){
  if(npc.rescued) return;
  npc.bob += 0.03;
  const bob = Math.sin(npc.bob)*3;
  c.save();
  c.translate(npc.x, npc.y + bob);

  c.beginPath();c.arc(0,-4,8,0,Math.PI*2);c.fill();

  c.fillRect(-6, 4, 12, 10);
  // Face
  c.fillStyle = '#fff';
  c.beginPath();c.arc(-3,-5,2,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(3,-5,2,0,Math.PI*2);c.fill();

  c.fillStyle = '#fbbf24';
  c.font = 'bold 10px sans-serif';

// ── Draw Button ──────────────────────────────────────────────────────
function drawButton(c, btn){
  const tx = btn.bx * TILE, ty = btn.by * TILE;
  c.fillStyle = btn.pressed ? 'rgba(34,197,94,0.5)' : 'rgba(251,191,36,0.5)';
  c.beginPath();

  c.stroke();
